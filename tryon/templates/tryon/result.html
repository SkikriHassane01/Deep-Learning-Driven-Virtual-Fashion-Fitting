{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Try-On Result</title>
  <link rel="stylesheet" href="{% static 'tryon/css/styles.css' %}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <div class="container">
    <h1>Your Try-On</h1>

    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="msg {{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    <div class="card">
      {% if obj.result_image %}
        <img src="/media/{{ obj.result_image }}" alt="Result image" class="result-img"/>
        <div class="meta">
          <div><strong>Prompt:</strong> {{ obj.prompt }}</div>
          <a class="btn" href="{% url 'home' %}">Try another</a>
        </div>
      {% else %}
        <p>No result image was saved for this request.</p>
        <a class="btn" href="{% url 'home' %}">Back</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
