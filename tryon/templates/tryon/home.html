<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Fashion Try-On</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'tryon/css/styles.css' %}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Virtual Fashion Try-On</h1>
            <p>Upload your photo and try on different clothes virtually!</p>
        </div>

        <div class="content">
            <form action="{% url 'submit' %}" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Your photo:</label>
                    <div class="upload-card">
                        {{ form.user_image }}
                        <div class="image-preview" id="user-preview">
                            <img src="" alt="User preview" />
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Describe the clothing (text):</label>
                    {{ form.prompt }}
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px;">
                        {{ form.generate_from_prompt }}
                        <strong>Generate cloth from text</strong>
                    </label>
                </div>

                <div id="upload-block">
                    <div class="form-group">
                        <label>Or upload a cloth image:</label>
                        <div class="upload-card">
                            {{ form.cloth_image }}
                            <div class="image-preview" id="cloth-preview">
                                <img src="" alt="Cloth preview" />
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label><small>(Optional) Cloth mask (PNG; white=cloth, black=bg):</small></label>
                        <div class="upload-card">
                            {{ form.cloth_mask }}
                            <div class="image-preview" id="mask-preview">
                                <img src="" alt="Mask preview" />
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Create Try-On</button>
            </form>
        </div>
    </div>

    <script>
        // Toggle functionality
        const chk = document.querySelector('input[name="generate_from_prompt"]');
        const block = document.getElementById('upload-block');
        function toggle() { 
            block.style.opacity = chk.checked ? 0.5 : 1; 
            block.style.pointerEvents = chk.checked ? 'none' : 'auto';
        }
        chk.addEventListener('change', toggle); 
        toggle();

        // Image preview functionality
        function setupImagePreview(inputId, previewId) {
            const input = document.querySelector(`input[name="${inputId}"]`);
            const preview = document.getElementById(previewId);
            const img = preview.querySelector('img');

            if (input) {
                input.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            img.src = e.target.result;
                            preview.style.display = 'block';
                        };
                        reader.readAsDataURL(file);
                    } else {
                        preview.style.display = 'none';
                    }
                });
            }
        }

        // Setup previews for all file inputs
        setupImagePreview('user_image', 'user-preview');
        setupImagePreview('cloth_image', 'cloth-preview');
        setupImagePreview('cloth_mask', 'mask-preview');
    </script>
</body>
</html>
